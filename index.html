<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Memory Booth 💿</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');

body {
  margin: 0;
  font-family: 'Courier Prime', monospace;
  background: #f4ecd8;
  color: #3b2f2f;
  text-align: center;
}

/* film grain */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("https://www.transparenttextures.com/patterns/noise.png");
  opacity: 0.15;
  pointer-events: none;
}

h1 {
  margin-top: 40px;
  font-size: 40px;
  letter-spacing: 2px;
}

.section {
  background: #fff8e7;
  border: 2px dashed #a68a64;
  margin: 25px auto;
  padding: 20px;
  width: 80%;
  box-shadow: 5px 5px 0 #a68a64;
  border-radius: 10px;
}

/* gallery */
.gallery img {
  width: 180px;
  margin: 10px;
  border: 5px solid #a68a64;
  filter: sepia(0.3);
  border-radius: 6px;
}

/* photobooth strip */
.booth {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.booth img {
  width: 200px;
  margin: 5px 0;
  border: 6px solid #3b2f2f;
  box-shadow: 4px 4px 0 #a68a64;
  filter: contrast(1.1) sepia(0.2);
}

footer {
  margin: 40px;
  opacity: 0.7;
}
</style>
</head>

<body>

<h1>OUR MEMORY BOOTH 💿</h1>
<p>A collection of moments that never really happened… but still feel real 💕</p>

<div class="section">
  <h2>💌 Our Story</h2>
  <p>Somewhere in time, we existed in every universe together.</p>
</div>

<div class="section gallery">
  <h2>💕 Couple Memories</h2>

  <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1" alt="">
  <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7" alt="">
  <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e" alt="">
</div>

<div class="section">
  <h2>📸 Photobooth Strip</h2>

  <div class="booth">
    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1">
    <img src="https://images.unsplash.com/photo-1518199266791-5375a83190b7">
    <img src="https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e">
  </div>
</div>

<footer>
Made like a forgotten love reel 🎞️
</footer>

</body>
</html>
