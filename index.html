<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Anniversary ❤️</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: white;
  text-align: center;
  overflow-x: hidden;
}

h1 {
  font-size: 50px;
  margin-top: 60px;
}

p {
  font-size: 18px;
  max-width: 700px;
  margin: auto;
}

section {
  background: rgba(0,0,0,0.2);
  margin: 30px auto;
  padding: 20px;
  width: 80%;
  border-radius: 20px;
}

/* floating hearts */
.heart {
  position: fixed;
  color: rgba(255,255,255,0.7);
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Happy Anniversary ❤️</h1>
<p>Every moment with you feels like my favourite story written by the universe.</p>

<section>
<h2>Our Story</h2>
<p>This is just the beginning of forever with you 💕</p>
</section>

<section>
<h2>Why I Love You</h2>
<p>You make even ordinary days feel special ✨</p>
</section>

<section>
<h2>Love Note</h2>
<p>No matter where life takes us, I’ll always choose you ❤️</p>
</section>

<script>
// floating hearts
for (let i = 0; i < 20; i++) {
  let heart = document.createElement("div");
  heart.innerHTML = "❤️";
  heart.className = "heart";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (3 + Math.random() * 5) + "s";
  heart.style.fontSize = (10 + Math.random() * 20) + "px";
  document.body.appendChild(heart);
}
</script>

</body>
</html>
