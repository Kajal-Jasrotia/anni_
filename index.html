<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Anniversary ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #ffdde1, #ee9ca7);
      color: #fff;
      text-align: center;
    }

    header {
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
    }

    p {
      font-size: 18px;
    }

    .card {
      background: rgba(0,0,0,0.2);
      margin: 20px auto;
      padding: 20px;
      width: 80%;
      border-radius: 15px;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <header>
    <h1>Happy Anniversary ❤️</h1>
    <p>Every moment with you is my favorite memory.</p>
  </header>

  <div class="card">
    <h2>Our Story</h2>
    <p>This is just the beginning of forever with you 💕</p>
  </div>

  <div class="card">
    <h2>Why I Love You</h2>
    <p>You make my world brighter every day ✨</p>
  </div>

  <footer>
    Made with love ❤️
  </footer>
</body>
</html>
